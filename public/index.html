<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Reviewer — ATS Resume Analyzer</title>
<meta name="description" content="Upload your resume, paste a job description, get a match score, missing keywords, stronger bullets, a tailored summary, and a cover letter draft." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,200..900,30..100,0..1;1,9..144,200..900,30..100,0..1&family=Manrope:wght@300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<style>
:root {
  --cream: #F2ECE0;
  --paper: #FBF7EE;
  --ink: #15110D;
  --ink-soft: #2C2620;
  --muted: #786C5A;
  --line: #D9CFB9;
  --line-soft: #E8DFCB;
  --accent: #7A2E1F;
  --accent-soft: #A8543F;
  --good: #4A6B3A;
  --warn: #8B6914;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--cream); color: var(--ink);
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 15px; line-height: 1.55;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
body {
  background-image:
    radial-gradient(circle at 12% 8%, rgba(122,46,31,0.04) 0%, transparent 40%),
    radial-gradient(circle at 92% 88%, rgba(122,46,31,0.03) 0%, transparent 40%);
  min-height: 100vh;
}
.shell { max-width: 1180px; margin: 0 auto; padding: 56px 40px 120px; }
@media (max-width: 720px) { .shell { padding: 36px 22px 80px; } }

.masthead {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--ink); padding-bottom: 14px; margin-bottom: 56px;
}
.brand {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'opsz' 144, 'SOFT' 30, 'WONK' 1;
  font-weight: 500; font-size: 22px; letter-spacing: -0.01em;
}
.brand em { font-style: italic; color: var(--accent); }
.eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
}

.hero {
  display: grid; grid-template-columns: 1fr 280px; gap: 60px;
  align-items: end; margin-bottom: 64px; padding-bottom: 48px;
  border-bottom: 1px solid var(--line);
}
@media (max-width: 880px) { .hero { grid-template-columns: 1fr; gap: 24px; } }
.headline {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'opsz' 144, 'SOFT' 50, 'WONK' 0;
  font-weight: 350; font-size: clamp(46px, 6.6vw, 84px);
  line-height: 0.96; letter-spacing: -0.025em; color: var(--ink);
}
.headline em {
  font-style: italic;
  font-variation-settings: 'opsz' 144, 'SOFT' 80, 'WONK' 1;
  color: var(--accent);
}
.dek {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'opsz' 24, 'SOFT' 30;
  font-weight: 400; font-style: italic; font-size: 16px;
  line-height: 1.5; color: var(--ink-soft);
  border-left: 2px solid var(--accent); padding-left: 14px;
}

.inputs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  border: 1px solid var(--line); background: var(--paper); margin-bottom: 28px;
}
@media (max-width: 880px) { .inputs { grid-template-columns: 1fr; } }
.input-cell { padding: 28px 30px 32px; position: relative; }
.input-cell + .input-cell { border-left: 1px solid var(--line); }
@media (max-width: 880px) { .input-cell + .input-cell { border-left: none; border-top: 1px solid var(--line); } }
.cell-label { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
.cell-num {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: 28px; color: var(--accent); line-height: 1;
}
.cell-name {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
}

.drop {
  border: 1.5px dashed var(--line); background: rgba(255,255,255,0.4);
  padding: 36px 20px; text-align: center; cursor: pointer;
  transition: all 0.18s ease; min-height: 200px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
}
.drop:hover, .drop.drag { border-color: var(--accent); background: rgba(122,46,31,0.04); }
.drop-icon { font-family: 'Fraunces', serif; font-size: 36px; font-style: italic; color: var(--accent); font-weight: 300; }
.drop-prompt { font-family: 'Fraunces', serif; font-style: italic; font-size: 18px; color: var(--ink); }
.drop-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
}
.drop.has-file { border-style: solid; border-color: var(--good); background: rgba(74,107,58,0.05); }
.file-name { font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 14px; color: var(--ink); word-break: break-all; }
.file-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase;
}
.replace {
  margin-top: 8px; font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.14em; color: var(--accent);
  text-transform: uppercase; text-decoration: underline; text-underline-offset: 3px; cursor: pointer;
}

.jd-input {
  width: 100%; min-height: 200px; padding: 14px 16px;
  border: 1.5px solid var(--line); background: rgba(255,255,255,0.5);
  font-family: 'Manrope', sans-serif; font-size: 14px;
  color: var(--ink); resize: vertical; line-height: 1.55;
  transition: border-color 0.18s ease;
}
.jd-input:focus { outline: none; border-color: var(--accent); }
.jd-input::placeholder { color: var(--muted); font-style: italic; font-family: 'Fraunces', serif; }

.run-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 56px; }
.run-btn {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
  font-size: 22px; background: var(--ink); color: var(--paper);
  border: none; padding: 16px 40px; cursor: pointer;
  letter-spacing: -0.01em; transition: all 0.2s ease;
  position: relative; overflow: hidden;
}
.run-btn::after { content: "→"; margin-left: 14px; font-style: normal; display: inline-block; transition: transform 0.2s ease; }
.run-btn:hover:not(:disabled) { background: var(--accent); }
.run-btn:hover:not(:disabled)::after { transform: translateX(4px); }
.run-btn:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.6; }
.run-status {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
}
.error { color: var(--accent); font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; }

.loading-rule { height: 2px; background: var(--line-soft); position: relative; overflow: hidden; margin: 16px 0; }
.loading-rule::after {
  content: ""; position: absolute; inset: 0; width: 30%;
  background: var(--accent); animation: slide 1.4s ease-in-out infinite;
}
@keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }

.results { animation: fade 0.4s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.section { border-top: 1px solid var(--ink); padding-top: 24px; margin-bottom: 56px; }
.section-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; }
.section-num {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: 16px; color: var(--accent); letter-spacing: 0.05em;
}
.section-title {
  font-family: 'Fraunces', serif; font-weight: 400; font-size: 30px;
  letter-spacing: -0.015em; line-height: 1;
}
.section-title em { font-style: italic; color: var(--accent); }

.score-grid { display: grid; grid-template-columns: 280px 1fr; gap: 56px; align-items: start; }
@media (max-width: 720px) { .score-grid { grid-template-columns: 1fr; gap: 24px; } }
.score-num {
  font-family: 'Fraunces', serif;
  font-variation-settings: 'opsz' 144, 'SOFT' 80, 'WONK' 1;
  font-weight: 300; font-style: italic; font-size: 180px;
  line-height: 0.85; letter-spacing: -0.04em; color: var(--ink);
}
.score-num .of { font-size: 32px; color: var(--muted); font-style: normal; margin-left: 4px; letter-spacing: 0; }
.score-meter { height: 4px; background: var(--line-soft); margin-top: 14px; position: relative; }
.score-meter-fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
.score-rationale {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
  font-size: 22px; line-height: 1.4; color: var(--ink-soft);
  letter-spacing: -0.01em; border-left: 2px solid var(--accent); padding-left: 18px;
}

.kw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
@media (max-width: 720px) { .kw-grid { grid-template-columns: 1fr; gap: 28px; } }
.kw-block-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
}
.chips { display: flex; flex-wrap: wrap; gap: 8px 10px; }
.chip { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 500; padding: 5px 10px; letter-spacing: 0.02em; }
.chip-match { background: rgba(74,107,58,0.1); color: var(--good); border: 1px solid rgba(74,107,58,0.3); }
.chip-miss { background: rgba(122,46,31,0.07); color: var(--accent); border: 1px solid rgba(122,46,31,0.25); }
.flag-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.flag { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; color: var(--ink-soft); padding-left: 16px; border-left: 2px solid var(--warn); }

.bullet-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 18px 0; border-bottom: 1px solid var(--line-soft); }
.bullet-row:last-child { border-bottom: none; }
@media (max-width: 720px) { .bullet-row { grid-template-columns: 1fr; gap: 12px; } }
.bullet-cell-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.bullet-orig { font-family: 'Fraunces', serif; font-style: italic; font-size: 15.5px; color: var(--muted); line-height: 1.5; }
.bullet-new { font-family: 'Manrope', sans-serif; font-weight: 500; font-size: 15.5px; color: var(--ink); line-height: 1.5; }

.output-block { background: var(--paper); border: 1px solid var(--line); padding: 28px 30px; position: relative; }
.summary-text { font-family: 'Fraunces', serif; font-weight: 400; font-size: 20px; line-height: 1.5; color: var(--ink); letter-spacing: -0.005em; }
.cover-text { font-family: 'Manrope', sans-serif; font-size: 14.5px; line-height: 1.65; color: var(--ink-soft); white-space: pre-wrap; }
.copy-btn {
  position: absolute; top: 18px; right: 18px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
  background: transparent; border: 1px solid var(--line);
  padding: 6px 10px; cursor: pointer; transition: all 0.18s ease;
}
.copy-btn:hover { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.copy-btn.copied { color: var(--paper); background: var(--good); border-color: var(--good); }

.colophon {
  margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
}
.reset {
  color: var(--accent); background: none; border: none;
  font-family: inherit; font-size: inherit; letter-spacing: inherit;
  text-transform: inherit; cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
}
.reset:hover { color: var(--ink); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect } = React;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function extractText(file) {
  const lower = file.name.toLowerCase();
  const ab = await file.arrayBuffer();
  if (lower.endsWith(".pdf")) {
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let out = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      out += content.items.map(it => it.str).join(" ") + "\n";
    }
    return out.trim();
  }
  if (lower.endsWith(".docx")) {
    const r = await mammoth.extractRawText({ arrayBuffer: ab });
    return r.value.trim();
  }
  throw new Error("Only .pdf or .docx files are supported.");
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const onClick = async () => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 1600);
    } catch {}
  };
  return (
    <button className={`copy-btn ${copied ? "copied" : ""}`} onClick={onClick}>
      {copied ? "Copied" : "Copy"}
    </button>
  );
}

function App() {
  const [resumeText, setResumeText] = useState("");
  const [resumeFile, setResumeFile] = useState(null);
  const [parsing, setParsing] = useState(false);
  const [jdText, setJdText] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [results, setResults] = useState(null);
  const [drag, setDrag] = useState(false);
  const fileRef = useRef(null);
  const resultsRef = useRef(null);

  useEffect(() => {
    if (results && resultsRef.current) {
      resultsRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, [results]);

  const handleFile = async (file) => {
    if (!file) return;
    setParsing(true);
    setError("");
    try {
      const text = await extractText(file);
      if (!text || text.length < 80) {
        throw new Error("Couldn't extract enough text. If this is a scanned PDF, try a text-based version.");
      }
      setResumeText(text);
      setResumeFile({ name: file.name, size: file.size });
    } catch (e) {
      setError(e.message);
      setResumeText(""); setResumeFile(null);
    } finally {
      setParsing(false);
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDrag(false);
    const file = e.dataTransfer.files?.[0];
    if (file) handleFile(file);
  };

  const analyze = async () => {
    if (!resumeText.trim()) { setError("Upload a resume first."); return; }
    if (!jdText.trim() || jdText.trim().length < 60) {
      setError("Paste the full job description (at least a few sentences)."); return;
    }
    setLoading(true); setError(""); setResults(null);

    try {
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ resumeText, jdText })
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || `Request failed (${res.status})`);
      }
      setResults(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const reset = () => {
    setResumeText(""); setResumeFile(null); setJdText("");
    setResults(null); setError("");
  };

  const ready = !!resumeText && !!jdText.trim() && !loading && !parsing;

  return (
    <div className="shell">
      <header className="masthead">
        <div className="brand">The <em>Reviewer</em></div>
        <div className="eyebrow">ATS · Tailoring · Drafting</div>
      </header>

      <section className="hero">
        <h1 className="headline">
          Read your resume<br/>
          <em>like a recruiter would.</em>
        </h1>
        <p className="dek">
          Upload a resume, paste a job description. Get a match score, the keywords you're missing,
          stronger bullets, a tailored summary, and a cover letter draft — in one pass.
        </p>
      </section>

      <div className="inputs">
        <div className="input-cell">
          <div className="cell-label">
            <span className="cell-num">i.</span>
            <span className="cell-name">Your Resume</span>
          </div>
          <div
            className={`drop ${drag ? "drag" : ""} ${resumeFile ? "has-file" : ""}`}
            onClick={() => fileRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={onDrop}
          >
            {parsing ? (
              <>
                <div className="drop-prompt">Reading the file…</div>
                <div className="loading-rule" style={{width: "70%"}}></div>
              </>
            ) : resumeFile ? (
              <>
                <div className="drop-icon">✓</div>
                <div className="file-name">{resumeFile.name}</div>
                <div className="file-meta">
                  {(resumeFile.size / 1024).toFixed(1)} KB · {resumeText.length.toLocaleString()} chars
                </div>
                <div className="replace">Replace file</div>
              </>
            ) : (
              <>
                <div className="drop-icon">+</div>
                <div className="drop-prompt">Drop a .pdf or .docx</div>
                <div className="drop-sub">or click to browse</div>
              </>
            )}
          </div>
          <input
            ref={fileRef}
            type="file"
            accept=".pdf,.docx"
            style={{ display: "none" }}
            onChange={(e) => handleFile(e.target.files?.[0])}
          />
        </div>

        <div className="input-cell">
          <div className="cell-label">
            <span className="cell-num">ii.</span>
            <span className="cell-name">Job Description</span>
          </div>
          <textarea
            className="jd-input"
            placeholder="Paste the full posting — title, responsibilities, qualifications, the lot."
            value={jdText}
            onChange={(e) => setJdText(e.target.value)}
          />
        </div>
      </div>

      <div className="run-row">
        <button className="run-btn" onClick={analyze} disabled={!ready}>
          {loading ? "Analyzing" : "Analyze"}
        </button>
        <div className="run-status">
          {loading && "Working — this takes ~10–20 seconds"}
          {error && <span className="error">{error}</span>}
          {!loading && !error && resumeFile && jdText.trim() && "Ready"}
          {!loading && !error && (!resumeFile || !jdText.trim()) && "Add resume + JD to begin"}
        </div>
      </div>

      {loading && <div className="loading-rule"></div>}

      {results && (
        <div className="results" ref={resultsRef}>
          <section className="section">
            <div className="section-head">
              <span className="section-num">§ 01</span>
              <h2 className="section-title">The <em>verdict.</em></h2>
            </div>
            <div className="score-grid">
              <div>
                <div className="score-num">
                  {results.score}<span className="of">/100</span>
                </div>
                <div className="score-meter">
                  <div className="score-meter-fill" style={{width: `${Math.max(0, Math.min(100, results.score))}%`}}></div>
                </div>
              </div>
              <p className="score-rationale">{results.scoreRationale}</p>
            </div>
          </section>

          <section className="section">
            <div className="section-head">
              <span className="section-num">§ 02</span>
              <h2 className="section-title">Keywords — <em>hits & gaps.</em></h2>
            </div>
            <div className="kw-grid">
              <div>
                <div className="kw-block-label">Strong matches ({results.matchedKeywords?.length || 0})</div>
                <div className="chips">
                  {(results.matchedKeywords || []).map((k, i) => (
                    <span key={i} className="chip chip-match">{k}</span>
                  ))}
                </div>
              </div>
              <div>
                <div className="kw-block-label">Missing — add these ({results.missingKeywords?.length || 0})</div>
                <div className="chips">
                  {(results.missingKeywords || []).map((k, i) => (
                    <span key={i} className="chip chip-miss">{k}</span>
                  ))}
                </div>
              </div>
            </div>
            {results.formatFlags?.length > 0 && (
              <>
                <div className="kw-block-label" style={{marginTop: 32}}>Formatting flags</div>
                <div className="flag-list">
                  {results.formatFlags.map((f, i) => <div key={i} className="flag">{f}</div>)}
                </div>
              </>
            )}
          </section>

          <section className="section">
            <div className="section-head">
              <span className="section-num">§ 03</span>
              <h2 className="section-title">Tailored <em>summary.</em></h2>
            </div>
            <div className="output-block">
              <CopyButton text={results.tailoredSummary} />
              <p className="summary-text">{results.tailoredSummary}</p>
            </div>
          </section>

          <section className="section">
            <div className="section-head">
              <span className="section-num">§ 04</span>
              <h2 className="section-title">Stronger <em>bullets.</em></h2>
            </div>
            <div>
              {(results.rewrittenBullets || []).map((b, i) => (
                <div key={i} className="bullet-row">
                  <div>
                    <div className="bullet-cell-label">Before</div>
                    <div className="bullet-orig">{b.original}</div>
                  </div>
                  <div>
                    <div className="bullet-cell-label">After</div>
                    <div className="bullet-new">{b.rewritten}</div>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="section">
            <div className="section-head">
              <span className="section-num">§ 05</span>
              <h2 className="section-title">Cover letter <em>draft.</em></h2>
            </div>
            <div className="output-block">
              <CopyButton text={results.coverLetter} />
              <div className="cover-text">{results.coverLetter}</div>
            </div>
          </section>
        </div>
      )}

      <footer className="colophon">
        <div>The Reviewer · v1.0</div>
        {(resumeFile || jdText || results) && (
          <button className="reset" onClick={reset}>Start over</button>
        )}
        <div>Built with Claude</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
